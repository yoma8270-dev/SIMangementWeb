<!DOCTYPE html>
<html>

<head>

    <title>Teacher Login</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Enter Email">

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <button id="loginBtn">
        Login
    </button>

    <button id="registerBtn">
        Register 
    </button>

    <button id="forgotBtn">
        Forgot Password
    </button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
