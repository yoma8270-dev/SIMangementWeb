<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Stock Management System</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>Inventory Stock Management System</h1>

        <div id="clock"></div>

        <div class="dashboard">

            <div class="card">
                <h3>Total Products</h3>
                <p id="totalProducts">0</p>
            </div>

            <div class="card">
                <h3>Total Quantity</h3>
                <p id="totalQty">0</p>
            </div>

            <div class="card">
                <h3>Low Stock</h3>
                <p id="lowStock">0</p>
            </div>

            <div class="card">
                <h3>Grand Total</h3>
                <p id="grandTotal">₹0</p>
            </div>

        </div>

        <div class="form-box">


            <input type="text" id="productName" placeholder="Product Name">

            <input type="number" id="quantity" placeholder="Quantity">

            <input type="number" id="price" placeholder="Price">

            <input type="number" id="gst" placeholder="GST %">

            <button onclick="addProduct()">
                Add Product
            </button>

        </div>

        <input type="text" id="search" placeholder="Search Product" onkeyup="searchProduct()">

        <table>

            <thead>

                <tr>
                    <th>Sr No</th>
                    <th>Date</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>GST %</th>
                    <th>GST Amt</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

        <div class="btn-box">

            <button onclick="downloadPDF()">
                Download PDF
            </button>

            <button onclick="window.print()">
                Print Bill
            </button>

            <button onclick="logoutUser()">
                Logout
            </button>

        </div>

    </div>

<script type="module" src="java.js"></script>
</body>

</html>
